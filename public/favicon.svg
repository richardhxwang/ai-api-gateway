<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="64" rx="28" fill="url(#shine)"/>
  <!-- Gateway symbol: central diamond hub with radiating lines -->
  <!-- Outer connection dots -->
  <circle cx="28" cy="34" r="7" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="34" r="7" fill="#fff" opacity="0.6"/>
  <circle cx="28" cy="94" r="7" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="94" r="7" fill="#fff" opacity="0.6"/>
  <circle cx="64" cy="20" r="7" fill="#fff" opacity="0.6"/>
  <circle cx="64" cy="108" r="7" fill="#fff" opacity="0.6"/>
  <!-- Connection lines to center -->
  <line x1="64" y1="64" x2="28" y2="34" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="64" x2="100" y2="34" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="64" x2="28" y2="94" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="64" x2="100" y2="94" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="64" x2="64" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="64" x2="64" y2="108" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Central hub: bold circle with inner ring -->
  <circle cx="64" cy="64" r="18" fill="#fff"/>
  <circle cx="64" cy="64" r="11" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="5" fill="#fff"/>
</svg>
