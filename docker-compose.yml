services:
  # Nginx reverse proxy — always running, serves maintenance page during app restarts
  nginx:
    image: nginx:alpine
    container_name: ai-gateway-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ai-api-proxy
    healthcheck:
      test: ["CMD", "sh", "-c", "nginx -t 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s

  # App server — can be rebuilt/restarted without downtime
  ai-api-proxy:
    build: .
    container_name: ai-api-proxy
    restart: unless-stopped
    # No ports exposed — only accessible via nginx
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.json()).then(d=>{if(d.status!=='ok')process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s

  cloudflare-aigateway:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-aigateway
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_AIGATEWAY}
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
